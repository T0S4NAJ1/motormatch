<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1118"/>
    </linearGradient>
    <linearGradient id="moto" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="320" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="80"  x2="480" y2="80"/>
    <line x1="0" y1="160" x2="480" y2="160"/>
    <line x1="0" y1="240" x2="480" y2="240"/>
    <line x1="120" y1="0" x2="120" y2="320"/>
    <line x1="240" y1="0" x2="240" y2="320"/>
    <line x1="360" y1="0" x2="360" y2="320"/>
  </g>

  <!-- Motorcycle silhouette (simple, generic) -->
  <g transform="translate(240,180)">
    <!-- Rear wheel -->
    <circle cx="-90" cy="40" r="34" fill="none" stroke="url(#moto)" stroke-width="4"/>
    <circle cx="-90" cy="40" r="14" fill="#1e293b" stroke="url(#moto)" stroke-width="2"/>
    <!-- Front wheel -->
    <circle cx="90" cy="40" r="34" fill="none" stroke="url(#moto)" stroke-width="4"/>
    <circle cx="90" cy="40" r="14" fill="#1e293b" stroke="url(#moto)" stroke-width="2"/>
    <!-- Frame -->
    <path d="M -90,40 L -40,-20 L 30,-20 L 90,40 Z" fill="url(#moto)" opacity="0.85"/>
    <!-- Seat -->
    <rect x="-50" y="-30" width="50" height="12" rx="4" fill="#0f172a"/>
    <!-- Tank -->
    <path d="M 0,-30 L 30,-30 L 35,-15 L -5,-15 Z" fill="#0f172a"/>
    <!-- Handlebar -->
    <line x1="30" y1="-20" x2="50" y2="-40" stroke="url(#moto)" stroke-width="3"/>
    <circle cx="50" cy="-40" r="4" fill="url(#moto)"/>
    <!-- Headlight -->
    <circle cx="60" cy="-10" r="8" fill="#fbbf24" opacity="0.8"/>
  </g>

  <!-- Text -->
  <text x="240" y="265" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="600" fill="#64748b"
        letter-spacing="2">
    GAMBAR TIDAK TERSEDIA
  </text>
  <text x="240" y="285" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#475569">
    Image not available
  </text>
</svg>
