<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotorMatch — Redirect</title>
  <script>
    // landing.html sudah digabung ke index.html (SPA)
    // Alihkan semua trafik ke index.html, pertahankan ?page= param jika ada
    var params = new URLSearchParams(window.location.search);
    var page = params.get('page');
    window.location.replace(page ? '/index.html?page=' + page : '/index.html');
  </script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;padding:2rem;color:#888;">Mengalihkan...</p>
</body>
</html>
